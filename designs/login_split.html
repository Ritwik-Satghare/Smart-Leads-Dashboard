<div class="w-10 h-10 rounded-xl bg-white/20 backdrop-blur-md flex items-center justify-center shadow-sm border border-white/30">
<span class="material-symbols-outlined text-white text-[24px]" style='font-variation-settings: "FILL" 1;'>dashboard</span>
</div>
<span class="text-headline-md font-bold text-white tracking-tight">Smart Leads</span>
</div>
<div class="relative z-20 mt-auto">
<h2 class="text-headline-lg md:text-display-lg text-white font-bold leading-tight drop-shadow-md">Turn your leads into loyal customers with intelligent automation.</h2>
</div>
</div>
<!-- Right Side (Sign-in Form) -->
<div class="w-full md:w-1/2 flex items-center justify-center p-6 md:p-12 bg-surface min-h-[500px] md:min-h-screen">
<!-- Main Content Canvas -->
<main class="w-full max-w-md z-10 relative">
<!-- Login Card -->
<div class="glass-card rounded-[24px] shadow-[0_20px_25px_-5px_rgba(0,0,0,0.1),0_8px_10px_-6px_rgba(0,0,0,0.1)] p-8 md:p-10 w-full flex flex-col gap-8 relative overflow-hidden bg-surface-container-lowest">

<div class="absolute top-0 left-0 right-0 h-[2px] bg-gradient-to-r from-transparent via-primary/30 to-transparent"></div>
<!-- Header Section -->
<div class="flex flex-col items-center gap-2 text-center">
<h2 class="text-headline-lg-mobile md:text-headline-md font-headline-lg-mobile md:font-headline-md text-on-surface">Welcome back</h2>
<p class="text-body-md font-body-md text-on-surface-variant">Please enter your details to sign in.</p>
</div>
<!-- Form Section -->
<form class="flex flex-col gap-6">
<!-- Inputs (Level 1 elevation via border, focus ring per Style Guidance) -->
<div class="flex flex-col gap-1.5">
<label class="text-label-md font-label-md text-on-surface" for="email">Email address</label>
<div class="relative group">
<div class="absolute inset-y-0 left-0 pl-3 flex items-center pointer-events-none">
<span class="material-symbols-outlined text-outline-variant group-focus-within:text-primary transition-colors text-[20px]">mail</span>
</div>
<input class="block w-full pl-10 pr-3 py-3 border border-outline-variant rounded-lg bg-surface-container-lowest text-on-surface text-body-md font-body-md placeholder:text-outline/70 focus:outline-none focus:ring-3 focus:ring-primary/20 focus:border-primary transition-all duration-200" id="email" name="email" placeholder="name@company.com" required="" type="email"/>
</div>
</div>
<div class="flex flex-col gap-1.5">
<label class="text-label-md font-label-md text-on-surface" for="password">Password</label>
<div class="relative group">
<div class="absolute inset-y-0 left-0 pl-3 flex items-center pointer-events-none">
<span class="material-symbols-outlined text-outline-variant group-focus-within:text-primary transition-colors text-[20px]">lock</span>
</div>
<input class="block w-full pl-10 pr-3 py-3 border border-outline-variant rounded-lg bg-surface-container-lowest text-on-surface text-body-md font-body-md placeholder:text-outline/70 focus:outline-none focus:ring-3 focus:ring-primary/20 focus:border-primary transition-all duration-200" id="password" name="password" placeholder="••••••••" required="" type="password"/>
</div>
</div>
<!-- Remember Me & Forgot Password -->
<div class="flex items-center justify-between mt-[-8px]">
<div class="flex items-center">
<input class="h-4 w-4 rounded border-outline-variant text-primary focus:ring-primary bg-surface-container-lowest cursor-pointer transition-colors" id="remember-me" name="remember-me" placeholder="on" type="checkbox" value=""/>
<label class="ml-2 block text-label-md font-label-md text-on-surface-variant cursor-pointer" for="remember-me">
                            Remember me
                        </label>
</div>
<div class="text-label-md font-label-md">
<a class="font-medium text-primary hover:text-primary-container transition-colors" href="#">Forgot password?</a>
</div>
</div>
<!-- Primary Action Button -->
<button class="w-full flex justify-center py-3 px-4 border border-transparent rounded-lg shadow-sm text-label-md font-label-md font-semibold text-on-primary bg-primary hover:bg-primary/90 focus:outline-none focus:ring-2 focus:ring-offset-2 focus:ring-primary transition-all duration-200 relative overflow-hidden group mt-2" type="submit">
<span class="absolute top-0 left-0 right-0 h-[1px] bg-white/20"></span>
                    Sign In
                </button>
</form>
<!-- Divider -->
<div class="relative mt-2">
<div class="absolute inset-0 flex items-center">
<div class="w-full border-t border-outline-variant/50"></div>
</div>
<div class="relative flex justify-center text-label-sm font-label-sm">
<span class="px-2 bg-surface-container-lowest text-outline">Or continue with</span>
</div>
</div>
<!-- SSO Options (Ghost buttons preferred for secondary actions) -->
<div class="grid grid-cols-2 gap-4">
<button class="w-full flex items-center justify-center gap-2 py-2.5 px-4 border border-outline-variant rounded-lg bg-surface-container-lowest text-label-md font-label-md text-on-surface hover:bg-surface-container-low transition-colors shadow-sm" type="button">
<svg class="h-5 w-5" viewbox="0 0 24 24" xmlns="http://www.w3.org/2000/svg">
<path d="M22.56 12.25c0-.78-.07-1.53-.2-2.25H12v4.26h5.92c-.26 1.37-1.04 2.53-2.21 3.31v2.77h3.57c2.08-1.92 3.28-4.74 3.28-8.09z" fill="#4285F4"></path>
<path d="M12 23c2.97 0 5.46-.98 7.28-2.66l-3.57-2.77c-.98.66-2.23 1.06-3.71 1.06-2.86 0-5.29-1.93-6.16-4.53H2.18v2.84C3.99 20.53 7.7 23 12 23z" fill="#34A853"></path>
<path d="M5.84 14.09c-.22-.66-.35-1.36-.35-2.09s.13-1.43.35-2.09V7.07H2.18C1.43 8.55 1 10.22 1 12s.43 3.45 1.18 4.93l2.85-2.22.81-.62z" fill="#FBBC05"></path>
<path d="M12 5.38c1.62 0 3.06.56 4.21 1.64l3.15-3.15C17.45 2.09 14.97 1 12 1 7.7 1 3.99 3.47 2.18 7.07l3.66 2.84c.87-2.6 3.3-4.53 6.16-4.53z" fill="#EA4335"></path>
</svg>

                </button>

<svg class="h-5 w-5 fill-current text-on-surface" viewbox="0 0 24 24" xmlns="http://www.w3.org/2000/svg">
<path d="M22 12c0-5.52-4.48-10-10-10S2 6.48 2 12c0 4.84 3.44 8.87 8 9.8V15H8v-3h2V9.5C10 7.57 11.57 6 13.5 6H16v3h-2c-.55 0-1 .45-1 1v2h3v3h-3v6.95c5.05-.5 9-4.76 9-9.95z"></path>
</svg>
